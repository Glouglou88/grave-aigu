<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz grave / médium / aigu</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background: linear-gradient(135deg, #dff6ff, #f8ecff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #2f2f2f;
    }

    .quiz-card {
      width: 100%;
      max-width: 1000px;
      background: rgba(255, 255, 255, 0.97);
      border-radius: 24px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.12);
      padding: 30px;
    }

    .badge {
      display: inline-block;
      background: #6c63ff;
      color: white;
      font-size: 14px;
      padding: 8px 14px;
      border-radius: 999px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      color: #3b2d72;
    }

    .subtitle {
      margin: 0 0 18px;
      font-size: 18px;
      color: #555;
    }

    .level-select {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .level-btn {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
      background: #ecebff;
      color: #3b2d72;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .level-btn:hover {
      background: #dcd9ff;
    }

    .level-btn.active {
      background: #6c63ff;
      color: white;
    }

    .level-btn.locked {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .progress-wrap {
      margin: 18px 0 28px;
    }

    .progress-label {
      font-size: 14px;
      margin-bottom: 8px;
      color: #555;
    }

    .progress-bar {
      width: 100%;
      height: 14px;
      background: #ecebff;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6c63ff, #9f7aea);
      transition: width 0.3s ease;
    }

    .top-zone {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      align-items: center;
      margin-bottom: 24px;
    }

    .sound-zone {
      background: linear-gradient(135deg, #eef7ff, #f7f0ff);
      border: 2px dashed #c8bfff;
      border-radius: 20px;
      padding: 26px 20px;
      text-align: center;
    }

    .sound-icon {
      font-size: 46px;
      margin-bottom: 12px;
    }

    .play-btn {
      background: linear-gradient(135deg, #2d89ef, #6c63ff);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 26px;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(76, 97, 255, 0.25);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .play-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(76, 97, 255, 0.32);
    }

    .piano-zone {
      background: #fafafa;
      border: 2px solid #ececec;
      border-radius: 20px;
      padding: 16px;
      text-align: center;
    }

    .piano-wrap {
      position: relative;
      width: 100%;
      margin: 0 auto;
      border-radius: 14px;
      overflow: hidden;
    }

    .piano-wrap img {
      width: 100%;
      display: block;
      border-radius: 14px;
    }

    .zone-overlay {
      position: absolute;
      top: 0;
      bottom: 0;
      pointer-events: none;
      transition: 0.25s ease;
      opacity: 0.20;
    }

    .zone-grave {
      left: 0%;
      width: 33%;
      background: rgba(0, 153, 255, 0.28);
      border-right: 2px solid rgba(0, 153, 255, 0.55);
    }

    .zone-medium {
      left: 33%;
      width: 34%;
      background: rgba(0, 200, 90, 0.26);
      border-right: 2px solid rgba(0, 200, 90, 0.55);
    }

    .zone-aigu {
      left: 67%;
      width: 33%;
      background: rgba(255, 0, 0, 0.24);
    }

    .zone-overlay.highlight {
      opacity: 0.55;
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.75);
    }

    .zone-label {
      position: absolute;
      top: 8px;
      font-weight: bold;
      font-size: 20px;
      text-shadow: 0 1px 2px rgba(255,255,255,0.9);
      pointer-events: none;
    }

    .label-grave {
      left: 12px;
      color: #0099ff;
    }

    .label-medium {
      left: 50%;
      transform: translateX(-50%);
      color: #00aa55;
    }

    .label-aigu {
      right: 12px;
      color: #ff0000;
    }

    .answers {
      display: grid;
      gap: 16px;
      margin-bottom: 20px;
    }

    .answers.two-cols {
      grid-template-columns: 1fr 1fr;
    }

    .answers.three-cols {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .answer-btn {
      border: none;
      border-radius: 18px;
      padding: 18px;
      font-size: 20px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .answer-btn:hover {
      transform: translateY(-1px);
    }

    .grave-btn {
      background: #d9f1ff;
      color: #135c8d;
    }

    .grave-btn:hover {
      background: #c7eaff;
    }

    .medium-btn {
      background: #e7ffe9;
      color: #19753a;
    }

    .medium-btn:hover {
      background: #d3ffd7;
    }

    .aigu-btn {
      background: #ffe2f2;
      color: #9b2f68;
    }

    .aigu-btn:hover {
      background: #ffd1ea;
    }

    .feedback {
      min-height: 78px;
      border-radius: 18px;
      padding: 16px 18px;
      background: #f7f7fb;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      margin-bottom: 18px;
    }

    .feedback.success {
      background: #e7f9ee;
      color: #18794e;
    }

    .feedback.error {
      background: #ffeaea;
      color: #b42318;
    }

    .staff-zone {
      display: none;
      margin-bottom: 20px;
      background: #fffdfd;
      border: 2px solid #ececec;
      border-radius: 18px;
      padding: 14px;
      text-align: center;
    }

    .staff-label {
      margin-bottom: 10px;
      font-weight: bold;
      color: #3b2d72;
    }

    .staff-svg {
      width: 100%;
      max-width: 420px;
      height: auto;
    }

    .bottom-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .score {
      font-size: 18px;
      font-weight: bold;
      color: #3b2d72;
    }

    .next-btn {
      background: #28a745;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 12px 22px;
      font-size: 17px;
      cursor: pointer;
      display: none;
    }

    .next-btn:hover {
      background: #23913d;
    }

    .final-screen {
      text-align: center;
      display: none;
      padding: 30px 10px 10px;
    }

    .final-screen h2 {
      font-size: 32px;
      color: #3b2d72;
      margin-bottom: 10px;
    }

    .final-score {
      font-size: 24px;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .restart-btn {
      background: linear-gradient(135deg, #6c63ff, #2d89ef);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 24px;
      font-size: 18px;
      cursor: pointer;
    }

    .unlock-message {
      margin-top: 10px;
      font-size: 18px;
      color: #18794e;
      font-weight: bold;
    }

    @media (max-width: 760px) {
      .top-zone,
      .answers.two-cols,
      .answers.three-cols {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-card">
    <div id="quizContent">
      <div class="badge">Exercice interactif</div>
      <h1>Grave, médium ou aigu ?</h1>
      <p class="subtitle">Écoute une note de piano, puis choisis sa zone sonore.</p>

      <div class="level-select">
        <button id="level1Btn" class="level-btn active" onclick="setLevel(1)">Niveau 1 : grave / aigu</button>
        <button id="level2Btn" class="level-btn locked" onclick="trySetLevel2()">Niveau 2 : grave / médium / aigu 🔒</button>
      </div>

      <div class="progress-wrap">
        <div class="progress-label" id="progressLabel">Question 1 sur 10</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="top-zone">
        <div class="sound-zone">
          <div class="sound-icon">🎹</div>
          <button class="play-btn" onclick="playSound()">▶ Écouter la note</button>
        </div>

        <div class="piano-zone">
          <div class="piano-wrap">
            <img src="piano.png" alt="Clavier de piano" />
            <div id="zoneGrave" class="zone-overlay zone-grave"></div>
            <div id="zoneMedium" class="zone-overlay zone-medium"></div>
            <div id="zoneAigu" class="zone-overlay zone-aigu"></div>

            <div class="zone-label label-grave">GRAVE</div>
            <div class="zone-label label-medium">MÉDIUM</div>
            <div class="zone-label label-aigu">AIGU</div>
          </div>
        </div>
      </div>

      <div class="answers two-cols" id="answersContainer"></div>

      <div id="feedback" class="feedback">Clique sur “Écouter la note”, puis choisis ta réponse.</div>

      <div id="staffZone" class="staff-zone">
        <div class="staff-label" id="staffLabel">Voici la note :</div>
        <svg class="staff-svg" viewBox="0 0 420 160" xmlns="http://www.w3.org/2000/svg">
          <line x1="40" y1="40" x2="380" y2="40" stroke="black" stroke-width="2"/>
          <line x1="40" y1="60" x2="380" y2="60" stroke="black" stroke-width="2"/>
          <line x1="40" y1="80" x2="380" y2="80" stroke="black" stroke-width="2"/>
          <line x1="40" y1="100" x2="380" y2="100" stroke="black" stroke-width="2"/>
          <line x1="40" y1="120" x2="380" y2="120" stroke="black" stroke-width="2"/>

          <text x="55" y="102" font-size="70" font-family="serif">𝄞</text>

          <line id="ledgerLine" x1="180" y1="0" x2="240" y2="0" stroke="black" stroke-width="2" style="display:none;" />

          <ellipse id="noteHead" cx="210" cy="0" rx="14" ry="10" fill="black" transform="rotate(-20 210 0)"/>
          <line id="noteStem" x1="222" y1="0" x2="222" y2="-40" stroke="black" stroke-width="3"/>
        </svg>
      </div>

      <div class="bottom-row">
        <div id="score" class="score">Score : 0 / 0</div>
        <button id="nextBtn" class="next-btn" onclick="nextQuestion()">Question suivante</button>
      </div>
    </div>

    <div id="finalScreen" class="final-screen">
      <h2 id="finalTitle">Bravo 🎉</h2>
      <div id="finalScore" class="final-score"></div>
      <div id="unlockMessage" class="unlock-message"></div>
      <p>Tu peux recommencer pour t’entraîner encore.</p>
      <button class="restart-btn" onclick="restartQuiz()">Recommencer</button>
    </div>
  </div>

  <script>
    // ------------------------
    // CONFIGURATION DES SONS
    // ------------------------

    const questions = [
  // GRAVE
  { file: "sons/son-grave-1.wav", type: "grave", label: "Note grave", y: 130, ledger: true },
  { file: "sons/son-grave-2.wav", type: "grave", label: "Note grave", y: 120, ledger: false },
  { file: "sons/son-grave-3.wav", type: "grave", label: "Note grave", y: 110, ledger: false },
  { file: "sons/son-grave-4.wav", type: "grave", label: "Note grave", y: 120, ledger: false },
  { file: "sons/son-grave-5.wav", type: "grave", label: "Note grave", y: 110, ledger: false },
  { file: "sons/son-grave-6.wav", type: "grave", label: "Note grave", y: 100, ledger: false },

  // MEDIUM
  { file: "sons/son-medium-1.wav", type: "medium", label: "Note médium", y: 90, ledger: false },
  { file: "sons/son-medium-2.wav", type: "medium", label: "Note médium", y: 80, ledger: false },
  { file: "sons/son-medium-3.wav", type: "medium", label: "Note médium", y: 70, ledger: false },
  { file: "sons/son-medium-4.wav", type: "medium", label: "Note médium", y: 80, ledger: false },
  { file: "sons/son-medium-5.wav", type: "medium", label: "Note médium", y: 70, ledger: false },
  { file: "sons/son-medium-6.wav", type: "medium", label: "Note médium", y: 60, ledger: false },

  // AIGU
  { file: "sons/son-aigu-1.wav", type: "aigu", label: "Note aiguë", y: 50, ledger: false },
  { file: "sons/son-aigu-2.wav", type: "aigu", label: "Note aiguë", y: 40, ledger: false },
  { file: "sons/son-aigu-3.wav", type: "aigu", label: "Note aiguë", y: 30, ledger: true },
  { file: "sons/son-aigu-4.wav", type: "aigu", label: "Note aiguë", y: 40, ledger: false },
  { file: "sons/son-aigu-5.wav", type: "aigu", label: "Note aiguë", y: 30, ledger: true },
  { file: "sons/son-aigu-6.wav", type: "aigu", label: "Note aiguë", y: 20, ledger: true }
];

    // ------------------------
    // VARIABLES
    // ------------------------

    let level = 1;
    let level2Unlocked = false;

    let currentQuestion = null;
    let currentAudio = null;
    let lastQuestionFile = null;

    let totalQuestions = 0;
    let correctAnswers = 0;
    let questionIndex = 0;
    let alreadyAnswered = false;

    const level1QuestionCount = 10;
    const level2QuestionCount = 10;
    const level1UnlockThreshold = 7;

    // ------------------------
    // INTERFACE
    // ------------------------

    function updateLevelButtons() {
      document.getElementById("level1Btn").classList.remove("active");
      document.getElementById("level2Btn").classList.remove("active");
      document.getElementById("level2Btn").classList.remove("locked");

      if (level === 1) {
        document.getElementById("level1Btn").classList.add("active");
      } else {
        document.getElementById("level2Btn").classList.add("active");
      }

      if (!level2Unlocked) {
        document.getElementById("level2Btn").classList.add("locked");
        document.getElementById("level2Btn").innerHTML = "Niveau 2 : grave / médium / aigu 🔒";
      } else {
        document.getElementById("level2Btn").innerHTML = "Niveau 2 : grave / médium / aigu";
      }
    }

    function generateAnswers() {
      const container = document.getElementById("answersContainer");

      if (level === 1) {
        container.className = "answers two-cols";
        container.innerHTML = `
          <button class="answer-btn grave-btn" onclick="checkAnswer('grave')">Grave</button>
          <button class="answer-btn aigu-btn" onclick="checkAnswer('aigu')">Aigu</button>
        `;
      } else {
        container.className = "answers three-cols";
        container.innerHTML = `
          <button class="answer-btn grave-btn" onclick="checkAnswer('grave')">Grave</button>
          <button class="answer-btn medium-btn" onclick="checkAnswer('medium')">Médium</button>
          <button class="answer-btn aigu-btn" onclick="checkAnswer('aigu')">Aigu</button>
        `;
      }
    }

    function updateProgress() {
      const maxQ = level === 1 ? level1QuestionCount : level2QuestionCount;
      const currentDisplay = Math.min(questionIndex + 1, maxQ);

      document.getElementById("progressLabel").textContent =
        `Question ${currentDisplay} sur ${maxQ}`;

      document.getElementById("progressFill").style.width =
        `${(questionIndex / maxQ) * 100}%`;
    }

    function setFeedback(message, type = "") {
      const feedback = document.getElementById("feedback");
      feedback.textContent = message;
      feedback.className = "feedback";
      if (type) feedback.classList.add(type);
    }

    function clearKeyboardHighlights() {
      document.getElementById("zoneGrave").classList.remove("highlight");
      document.getElementById("zoneMedium").classList.remove("highlight");
      document.getElementById("zoneAigu").classList.remove("highlight");
    }

    function highlightCorrectZone(type) {
      clearKeyboardHighlights();

      if (type === "grave") {
        document.getElementById("zoneGrave").classList.add("highlight");
      } else if (type === "medium") {
        document.getElementById("zoneMedium").classList.add("highlight");
      } else if (type === "aigu") {
        document.getElementById("zoneAigu").classList.add("highlight");
      }
    }

    // ------------------------
    // NIVEAUX
    // ------------------------

    function setLevel(l) {
      if (l === 2 && !level2Unlocked) return;

      level = l;
      updateLevelButtons();
      generateAnswers();
      restartQuiz();
    }

    function trySetLevel2() {
      if (!level2Unlocked) {
        setFeedback("🔒 Le niveau 2 se débloque après au moins 7 bonnes réponses sur 10 au niveau 1.");
        return;
      }
      setLevel(2);
    }

    // ------------------------
    // QUESTIONS
    // ------------------------

    function getFilteredQuestions() {
      if (level === 1) {
        return questions.filter(q => q.type !== "medium");
      }
      return questions;
    }

    function getRandomQuestionWithoutImmediateRepeat() {
      let filtered = getFilteredQuestions();

      let available = filtered.filter(q => q.file !== lastQuestionFile);

      if (available.length === 0) {
        available = filtered;
      }

      const chosen = available[Math.floor(Math.random() * available.length)];
      lastQuestionFile = chosen.file;
      return chosen;
    }

    function prepareAudio() {
      currentAudio = new Audio(currentQuestion.file);
      currentAudio.currentTime = 0;
    }

    function playSound() {
      if (!currentAudio) prepareAudio();
      currentAudio.currentTime = 0;
      currentAudio.play();
    }

    function generateQuestion() {
      alreadyAnswered = false;
      currentQuestion = getRandomQuestionWithoutImmediateRepeat();
      prepareAudio();

      document.getElementById("nextBtn").style.display = "none";
      document.getElementById("staffZone").style.display = "none";

      clearKeyboardHighlights();
      setFeedback("Clique sur “Écouter la note”, puis choisis ta réponse.");
      updateProgress();
    }

    // ------------------------
    // PORTEE
    // ------------------------

    function showNoteOnStaff() {
      const staffZone = document.getElementById("staffZone");
      const staffLabel = document.getElementById("staffLabel");
      const noteHead = document.getElementById("noteHead");
      const noteStem = document.getElementById("noteStem");
      const ledgerLine = document.getElementById("ledgerLine");

      const y = currentQuestion.y;

      noteHead.setAttribute("cy", y);
      noteStem.setAttribute("y1", y);
      noteStem.setAttribute("y2", y - 40);

      if (currentQuestion.ledger) {
        ledgerLine.style.display = "block";
        ledgerLine.setAttribute("y1", y);
        ledgerLine.setAttribute("y2", y);
      } else {
        ledgerLine.style.display = "none";
      }

      let zoneText = "";
      if (currentQuestion.type === "grave") zoneText = "zone grave";
      if (currentQuestion.type === "medium") zoneText = "zone médium";
      if (currentQuestion.type === "aigu") zoneText = "zone aiguë";

      staffLabel.textContent = `Voici la note : ${zoneText}`;
      staffZone.style.display = "block";
    }

    // ------------------------
    // REPONSES
    // ------------------------

    function checkAnswer(answer) {
      if (alreadyAnswered) return;

      alreadyAnswered = true;
      totalQuestions++;

      let label = currentQuestion.type;
      if (label === "medium") label = "médium";

      if (answer === currentQuestion.type) {
        correctAnswers++;
        setFeedback("✅ Bravo, c’est correct !", "success");
      } else {
        setFeedback(`❌ Ce n’est pas correct. La bonne réponse était : ${label}.`, "error");
      }

      document.getElementById("score").textContent =
        `Score : ${correctAnswers} / ${totalQuestions}`;

      showNoteOnStaff();
      highlightCorrectZone(currentQuestion.type);

      document.getElementById("nextBtn").style.display = "inline-block";
    }

    function nextQuestion() {
      questionIndex++;

      const maxQ = level === 1 ? level1QuestionCount : level2QuestionCount;

      if (questionIndex >= maxQ) {
        showFinalScreen();
        return;
      }

      generateQuestion();
    }

    // ------------------------
    // FIN DE QUIZ
    // ------------------------

    function showFinalScreen() {
      document.getElementById("quizContent").style.display = "none";
      document.getElementById("finalScreen").style.display = "block";

      const maxQ = level === 1 ? level1QuestionCount : level2QuestionCount;

      document.getElementById("finalScore").textContent =
        `Ton score final : ${correctAnswers} / ${maxQ}`;

      document.getElementById("progressFill").style.width = "100%";

      const finalTitle = document.getElementById("finalTitle");
      const unlockMessage = document.getElementById("unlockMessage");

      unlockMessage.textContent = "";

      if (level === 1) {
        if (correctAnswers >= level1UnlockThreshold) {
          level2Unlocked = true;
          finalTitle.textContent = "Bravo 🎉";
          unlockMessage.textContent =
            "Le niveau 2 est maintenant débloqué : grave, médium, aigu.";
        } else {
          finalTitle.textContent = "Bien essayé 👍";
          unlockMessage.textContent =
            "Encore un petit effort : il faut au moins 7 bonnes réponses sur 10 pour débloquer le niveau 2.";
        }
      } else {
        finalTitle.textContent = "Bravo 🎉";
        unlockMessage.textContent = "Tu as terminé le niveau 2.";
      }

      updateLevelButtons();
    }

    function restartQuiz() {
      totalQuestions = 0;
      correctAnswers = 0;
      questionIndex = 0;
      alreadyAnswered = false;
      lastQuestionFile = null;

      document.getElementById("score").textContent = "Score : 0 / 0";
      document.getElementById("quizContent").style.display = "block";
      document.getElementById("finalScreen").style.display = "none";

      clearKeyboardHighlights();
      generateQuestion();
    }

    // ------------------------
    // INIT
    // ------------------------

    updateLevelButtons();
    generateAnswers();
    generateQuestion();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exercice grave / aigu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      text-align: center;
      padding: 40px 20px;
      margin: 0;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #444;
    }

    button {
      font-size: 18px;
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .play-btn {
      background: #2d89ef;
      color: white;
    }

    .answer-btn {
      background: #eaeaea;
    }

    .answer-btn:hover {
      background: #dcdcdc;
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
      min-height: 30px;
    }

    #score {
      margin-top: 20px;
      font-size: 18px;
    }

    #nextBtn {
      background: #28a745;
      color: white;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Exercice : grave ou aigu ?</h1>
    <p>Écoute le son, puis choisis s’il est grave ou aigu.</p>

    <button class="play-btn" onclick="playSound()">▶ Écouter le son</button>

    <div>
      <button class="answer-btn" onclick="checkAnswer('grave')">Grave</button>
      <button class="answer-btn" onclick="checkAnswer('aigu')">Aigu</button>
    </div>

    <div id="result"></div>
    <div id="score">Score : 0 / 0</div>

    <button id="nextBtn" onclick="nextQuestion()">Question suivante</button>
  </div>

  <script>
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioContext = new AudioContext();

    let currentAnswer = "";
    let totalQuestions = 0;
    let correctAnswers = 0;
    let currentFrequency = 0;

    function generateQuestion() {
      const isHigh = Math.random() < 0.5;

      if (isHigh) {
        currentFrequency = 880;
        currentAnswer = "aigu";
      } else {
        currentFrequency = 220;
        currentAnswer = "grave";
      }

      document.getElementById("result").textContent = "";
      document.getElementById("nextBtn").style.display = "none";
    }

    function playTone(frequency, duration = 1) {
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();

      oscillator.type = "sine";
      oscillator.frequency.value = frequency;

      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);

      gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);

      oscillator.start();
      oscillator.stop(audioContext.currentTime + duration);
    }

    function playSound() {
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
      playTone(currentFrequency);
    }

    function checkAnswer(answer) {
      totalQuestions++;

      if (answer === currentAnswer) {
        correctAnswers++;
        document.getElementById("result").textContent = "✅ Bravo, c’est correct !";
        document.getElementById("result").style.color = "green";
      } else {
        document.getElementById("result").textContent =
          "❌ Ce n’est pas correct. La bonne réponse était : " + currentAnswer;
        document.getElementById("result").style.color = "red";
      }

      document.getElementById("score").textContent =
        `Score : ${correctAnswers} / ${totalQuestions}`;

      document.getElementById("nextBtn").style.display = "inline-block";
    }

    function nextQuestion() {
      generateQuestion();
    }

    generateQuestion();
  </script>
</body>
</html>
